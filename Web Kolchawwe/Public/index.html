<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolchawwe | Cerveza Artesanal San Fernando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- SDK de Mercado Pago -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --brand-gold: #b38e44;
            --brand-cream: #f4e9d5;
            --brand-dark: #1a1613;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--brand-dark);
            color: var(--brand-cream);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        .hero-section {
            background: linear-gradient(rgba(26, 22, 19, 0.9), rgba(26, 22, 19, 0.9)), 
                        url('https://images.unsplash.com/photo-1571767490048-222875c45e8e?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
        }

        .label-card {
            background-color: #110f0d;
            border: 1px solid #332d28;
            transition: all 0.3s ease;
        }

        .label-card:hover { border-color: var(--brand-gold); }

        #cart-panel {
            transition: transform 0.4s ease-in-out;
            transform: translateX(100%);
            z-index: 100;
        }
        #cart-panel.open { transform: translateX(0); }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(179, 142, 68, 0.1);
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Verificación de Edad -->
    <div id="age-gate" class="fixed inset-0 bg-black/95 z-[200] hidden items-center justify-center p-6 text-center">
        <div class="max-w-md w-full border border-brand-gold/30 p-10 bg-[#110f0d]">
            <h2 class="text-2xl font-bold text-brand-gold italic mb-4">¿ERES MAYOR DE EDAD?</h2>
            <p class="text-xs uppercase tracking-widest mb-8 opacity-70">Debes tener más de 18 años para entrar</p>
            <button onclick="verifyAge()" class="w-full bg-brand-gold text-white py-3 font-bold uppercase tracking-widest mb-4">Sí, soy mayor</button>
            <button onclick="window.location.href='https://google.com'" class="text-[10px] uppercase opacity-50">No, soy menor</button>
        </div>
    </div>

    <!-- Carrito -->
    <div id="cart-panel" class="fixed top-0 right-0 h-full w-full max-w-sm bg-[#0d0b0a] border-l border-[#332d28] p-6 shadow-2xl flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold text-brand-gold italic">Tu Pedido</h2>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4"></div>
        <div class="border-t border-[#332d28] pt-6 mt-4">
            <div class="flex justify-between text-lg font-bold mb-6">
                <span>Total:</span>
                <span id="cart-total" class="text-brand-gold">$0</span>
            </div>
            <button id="checkout-btn" onclick="startCheckout()" class="w-full bg-[#009ee3] py-4 rounded text-white font-bold uppercase tracking-widest text-xs flex items-center justify-center gap-2">
                <i class="fas fa-credit-card"></i> Pagar con Mercado Pago
            </button>
            <div id="walletBrick_container"></div>
            <p id="error-msg" class="text-red-500 text-[10px] mt-4 hidden text-center italic"></p>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="fixed w-full z-50 bg-[#110f0d]/80 backdrop-blur-md border-b border-[#332d28] px-6 py-4 flex justify-between items-center">
        <div class="text-lg font-bold tracking-[0.3em] text-brand-gold uppercase italic">KOLCHAWWE</div>
        <button onclick="toggleCart()" class="relative text-brand-gold">
            <i class="fas fa-shopping-basket text-xl"></i>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-white text-black text-[9px] rounded-full w-5 h-5 flex items-center justify-center font-bold">0</span>
        </button>
    </nav>

    <header class="hero-section min-h-[60vh] flex flex-col items-center justify-center text-center px-6 pt-20">
        <div class="border-2 border-brand-gold p-6 mb-6">
            <img src="Logo Kolchawwe.png" alt="Logo" class="w-40 md:w-56" onerror="this.style.display='none'; document.getElementById('fallback-title').classList.remove('hidden')">
            <h1 id="fallback-title" class="hidden text-3xl font-bold text-brand-gold tracking-widest">KOLCHAWWE</h1>
        </div>
        <p class="text-2xl md:text-4xl font-bold italic text-white uppercase tracking-tighter">Nobleza Salvaje</p>
    </header>

    <main class="py-20 px-6 max-w-6xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-3xl font-bold uppercase italic tracking-widest">Variedades</h2>
            <div class="w-16 h-0.5 bg-brand-gold mx-auto mt-4"></div>
        </div>
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Cargando... -->
            <div class="col-span-full text-center opacity-50 py-10">
                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                <p class="text-[10px] uppercase tracking-widest">Actualizando bodega...</p>
            </div>
        </div>
    </main>

    <footer class="bg-black py-16 text-center border-t border-[#1a1613]">
        <div class="flex justify-center space-x-6 mb-8">
            <a href="https://wa.me/56943409132" class="text-xl hover:text-brand-gold"><i class="fab fa-whatsapp"></i></a>
            <a href="https://instagram.com/kolchawwe" class="text-xl hover:text-brand-gold"><i class="fab fa-instagram"></i></a>
        </div>
        <p class="text-[9px] tracking-[0.4em] opacity-40 uppercase">San Fernando, Chile</p>
    </footer>

    <script type="module">
        // IMPORTACIÓN DE FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        /** * CONFIGURACIÓN DE FIREBASE
         * Si ejecutas esto localmente, reemplaza el contenido de 'localConfig' 
         * con las credenciales de tu proyecto de Firebase.
         */
        const localConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        // El entorno usa __firebase_config, localmente usa localConfig
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : localConfig;
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kolchawwe-web';

        // DATOS DE RESPALDO (Se muestran mientras carga la nube)
        let inventory = [
            { id: 'lager-01', name: 'Lager', price: 4500, desc: 'Equilibrada & Cítrica', alc: '5.2%', stock: 10 },
            { id: 'british-01', name: 'British Golden Ale', price: 4900, desc: 'Cuerpo & Aroma', alc: '7.5%', stock: 10 },
            { id: 'stout-01', name: 'Stout', price: 4900, desc: 'Oscura & Robusta', alc: '6.0%', stock: 10 }
        ];

        let cart = [];
        let ageVerified = localStorage.getItem('age-verified') === 'true';

        // Mercado Pago
        const mp = new MercadoPago('APP_USR-66a41ad9-9a3b-48b2-a060-27e662a71d72', { locale: 'es-CL' });

        // RENDERIZADO
        window.renderProducts = () => {
            const grid = document.getElementById('products-grid');
            if (!grid) return;
            
            grid.innerHTML = inventory.map(p => {
                const isOut = p.stock <= 0;
                return `
                <div class="label-card p-8 text-center flex flex-col justify-between ${isOut ? 'opacity-50' : ''}">
                    <div>
                        <h3 class="text-xl text-brand-gold mb-2 italic uppercase">${p.name}</h3>
                        <p class="text-[10px] tracking-widest opacity-50 mb-4">${p.desc || ''}</p>
                        <div class="flex justify-center gap-2">
                            <span class="text-[9px] font-bold border border-brand-gold/30 px-2 py-0.5 text-brand-gold">${p.alc || '5%'} ALC</span>
                            <span class="text-[9px] font-bold border border-white/10 px-2 py-0.5 text-white/40 uppercase tracking-tighter">${p.stock} DISP.</span>
                        </div>
                    </div>
                    <div class="mt-8">
                        <p class="text-2xl font-bold mb-6">${isOut ? 'AGOTADA' : '$' + p.price.toLocaleString()}</p>
                        <button onclick="addToCart('${p.id}')" 
                            ${isOut ? 'disabled' : ''}
                            class="w-full border border-brand-gold py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-brand-gold hover:text-white transition disabled:border-white/10 disabled:text-white/10">
                            ${isOut ? 'Próximamente' : 'Añadir al Carro'}
                        </button>
                    </div>
                </div>
            `}).join('');
        };

        // CONEXIÓN CORREGIDA (RULE 3 - Auth antes que Queries)
        async function startSync() {
            try {
                // 1. Autenticación (Priorizar token del entorno o anónima)
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // 2. Escuchar cambios de estado de auth
                onAuthStateChanged(auth, (user) => {
                    if (!user) return;

                    // 3. Obtener inventario de la ruta específica obligatoria
                    const invRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
                    
                    onSnapshot(invRef, (snap) => {
                        const cloudItems = [];
                        snap.forEach(doc => {
                            cloudItems.push({ id: doc.id, ...doc.data() });
                        });
                        
                        if (cloudItems.length > 0) {
                            inventory = cloudItems;
                        }
                        window.renderProducts();
                    }, (err) => {
                        console.error("Error al sincronizar con Firestore:", err);
                        window.renderProducts(); // Mostrar locales si falla
                    });
                });

            } catch (e) {
                console.error("Error de conexión inicial:", e);
                window.renderProducts();
            }
        }

        window.verifyAge = () => {
            ageVerified = true;
            localStorage.setItem('age-verified', 'true');
            document.getElementById('age-gate').classList.add('hidden');
        };

        if (!ageVerified) document.getElementById('age-gate').classList.remove('hidden');

        window.toggleCart = () => { document.getElementById('cart-panel').classList.toggle('open'); };

        window.addToCart = (id) => {
            const product = inventory.find(p => p.id === id);
            if (!product || product.stock <= 0) return;
            
            const exists = cart.find(item => item.id === id);
            if (exists) {
                if (exists.qty < product.stock) exists.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCart();
            if (!document.getElementById('cart-panel').classList.contains('open')) toggleCart();
        };

        window.updateQty = (id, delta) => {
            const item = cart.find(i => i.id === id);
            const product = inventory.find(p => p.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty > product.stock) item.qty = product.stock;
                if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
                updateCart();
            }
        };

        function updateCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            let total = 0, count = 0;

            if (!container) return;

            container.innerHTML = cart.length === 0 ? '<p class="text-center opacity-30 mt-10 italic text-[10px]">TU CARRO ESTÁ VACÍO</p>' :
                cart.map(item => {
                    total += item.price * item.qty;
                    count += item.qty;
                    return `
                        <div class="flex justify-between items-center bg-[#1a1613] p-4 border border-[#332d28]">
                            <div>
                                <p class="text-[10px] font-bold text-brand-gold uppercase">${item.name}</p>
                                <div class="qty-control mt-2">
                                    <button onclick="updateQty('${item.id}', -1)" class="text-brand-gold px-2">-</button>
                                    <span class="text-xs font-bold">${item.qty}</span>
                                    <button onclick="updateQty('${item.id}', 1)" class="text-brand-gold px-2">+</button>
                                </div>
                            </div>
                            <p class="text-xs font-bold">$${(item.price * item.qty).toLocaleString()}</p>
                        </div>
                    `;
                }).join('');

            totalEl.innerText = `$${total.toLocaleString()}`;
            countEl.innerText = count;
        }

        window.startCheckout = async () => {
            if (cart.length === 0) return;
            const btn = document.getElementById('checkout-btn');
            btn.disabled = true;
            btn.innerText = "Conectando...";

            try {
                const total = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
                const response = await fetch("https://web-kolchawwe.onrender.com/create_preference", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ title: "Pedido Kolchawwe", quantity: 1, price: total })
                });
                const pref = await response.json();
                const bricksBuilder = mp.bricks();
                await bricksBuilder.create("wallet", "walletBrick_container", {
                    initialization: { preferenceId: pref.id, redirectMode: 'modal' },
                });
                btn.classList.add('hidden');
            } catch (err) {
                document.getElementById('error-msg').innerText = "Error de conexión con Mercado Pago.";
                document.getElementById('error-msg').classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Reintentar";
            }
        };

        // INICIALIZACIÓN
        window.addEventListener('load', () => {
            startSync();
            updateCart();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión | Kolchawwe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #27272a; /* Zinc 800 - Gris de contraste */
        }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .nav-black { background-color: #000000; }

        .input-compact {
            @apply w-full bg-zinc-900 border border-zinc-700 rounded-lg p-3 text-lg transition-all focus:ring-2 focus:ring-amber-500 outline-none text-stone-200 font-bold text-center;
        }

        /* Botón Guardar Centrado y sin iconos */
        .btn-save {
            @apply bg-amber-500 text-black px-4 py-3 rounded-xl font-black text-sm hover:bg-amber-400 transition-all active:scale-[0.97] shadow-lg uppercase tracking-wider flex items-center justify-center gap-2 w-full border-b-4 border-amber-700;
        }

        /* Tarjeta de Variedad con mayor separación inferior */
        .card-variety {
            @apply bg-black border border-zinc-700 rounded-3xl p-8 shadow-2xl mb-32 max-w-md mx-auto relative overflow-hidden;
            border-top: 4px solid #f59e0b; 
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen text-stone-300">

    <nav class="nav-black border-b border-amber-900/20 sticky top-0 z-40 h-16 flex items-center">
        <div class="max-w-2xl mx-auto px-6 w-full flex justify-between items-center">
            <span class="text-xl font-bold tracking-tighter text-amber-500 uppercase">KOLCHAWWE <span class="text-[10px] text-zinc-500 font-normal ml-2 tracking-widest uppercase">Admin</span></span>
            <a href="/" class="text-[11px] font-bold text-zinc-400 hover:text-amber-500 transition tracking-widest uppercase flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Tienda
            </a>
        </div>
    </nav>

    <main class="px-6 py-12">
        <div class="max-w-xl mx-auto">
            
            <section id="login-section" class="max-w-xs mx-auto mt-16 fade-in">
                <div class="bg-black p-10 rounded-3xl border border-zinc-800 text-center shadow-2xl">
                    <h2 class="text-2xl font-bold text-amber-500 mb-8 italic font-serif">Acceso Maestro</h2>
                    <input type="password" id="adminPass" placeholder="Clave" 
                           class="input-compact text-3xl tracking-[0.6em] mb-6 border-amber-900/20">
                    <button onclick="verificarAcceso()" class="btn-save py-5 text-base">
                        INGRESAR
                    </button>
                </div>
            </section>

            <div id="admin-content" class="hidden">
                <div id="inventario-container" class="mt-10">
                    <!-- Tarjetas dinámicas se insertan aquí -->
                </div>
            </div>
        </div>
    </main>

    <!-- Notificaciones flotantes -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 opacity-0 translate-y-4 pointer-events-none transition-all duration-500 z-50 w-full max-w-xs">
        <div id="toast-content" class="bg-amber-500 text-black px-8 py-4 rounded-2xl text-center font-black shadow-2xl text-sm uppercase border-2 border-amber-400">
        </div>
    </div>

    <script>
        const isPreview = window.location.protocol === 'blob:' || window.location.hostname === '';
        
        function verificarAcceso() {
            const pass = document.getElementById('adminPass').value;
            if (pass === "1234") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                cargarInventario();
            } else {
                notificar("⛔ CLAVE INCORRECTA", true);
            }
        }

        async function cargarInventario() {
            const container = document.getElementById('inventario-container');
            try {
                const response = await fetch('/api/cervezas');
                const cervezas = await response.json();
                renderizar(cervezas);
            } catch (e) {
                if(isPreview) {
                    renderizar([
                        {id: 1, nombre: "Lager", precio: 4500, stock: 12},
                        {id: 2, nombre: "British Golden Ale", precio: 4800, stock: 15},
                        {id: 3, nombre: "Stout", precio: 5000, stock: 8}
                    ]);
                }
            }
        }

        function renderizar(data) {
            const container = document.getElementById('inventario-container');
            container.innerHTML = '';
            data.forEach(c => {
                const div = document.createElement('div');
                div.className = 'card-variety fade-in';
                div.innerHTML = `
                    <!-- 1. NOMBRE DE LA VARIEDAD -->
                    <div class="text-center mb-8">
                        <span class="text-[10px] text-amber-500/50 uppercase font-bold tracking-[0.4em] block mb-1">Cerveza Artesanal</span>
                        <h3 id="nombre-texto-${c.id}" class="text-3xl font-bold text-amber-500 italic">${c.nombre}</h3>
                    </div>

                    <div class="space-y-8">
                        <!-- 2. CAMPOS DE CANTIDADES AGRUPADOS -->
                        <div class="grid grid-cols-1 gap-6 bg-zinc-900/40 p-6 rounded-2xl border border-zinc-800">
                            <div>
                                <label class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em] block mb-3 ml-1">Precio Unitario</label>
                                <div class="relative">
                                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-amber-500 font-bold">$</span>
                                    <input type="number" id="precio-${c.id}" value="${c.precio}" class="input-compact pl-10 text-amber-500">
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em] block mb-3 ml-1">Stock Barriles</label>
                                <input type="number" id="stock-${c.id}" value="${c.stock}" class="input-compact text-white">
                            </div>
                        </div>

                        <!-- 3. BOTÓN GUARDAR AL FINAL -->
                        <button onclick="guardar(${c.id})" class="btn-save">
                            GUARDAR CAMBIOS
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function guardar(id) {
            const pass = document.getElementById('adminPass').value;
            const nombre = document.getElementById(`nombre-texto-${id}`).innerText;
            const precio = document.getElementById(`precio-${id}`).value;
            const stock = document.getElementById(`stock-${id}`).value;

            try {
                const res = await fetch('/api/admin/stock', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, nombre, precio, stock, password: pass })
                });
                if (res.ok) notificar("✅ GUARDADO: " + nombre);
                else notificar("❌ ERROR DE ACCESO", true);
            } catch (e) {
                if(isPreview) notificar("✨ SIMULADO: " + nombre);
            }
        }

        function notificar(msg, error = false) {
            const toast = document.getElementById('toast');
            const content = document.getElementById('toast-content');
            content.innerText = msg;
            content.className = `px-8 py-4 rounded-2xl text-center font-black shadow-2xl text-xs uppercase border-2 ${error ? 'bg-red-700 text-white border-red-500' : 'bg-amber-500 text-black border-amber-400'}`;
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 3000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Kolchawwe | Control Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+Pro:wght@400;600&display=swap');
        body { font-family: 'Source Sans Pro', sans-serif; background-color: #f4f1ea; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .input-field { @apply w-full p-2 border border-amber-200 rounded text-sm focus:ring-2 focus:ring-amber-500 outline-none bg-white transition-all; }
        .beer-card { @apply bg-white p-5 rounded-xl shadow-sm border border-amber-100 hover:shadow-md transition-all duration-300; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-amber-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider text-amber-200">KOLCHAWWE <span class="text-[10px] font-normal text-white block uppercase tracking-widest">Gestión de Producción</span></h1>
            <button onclick="cargarInventario()" class="bg-amber-600 hover:bg-amber-500 px-4 py-2 rounded-lg text-xs font-bold uppercase transition">Actualizar Vista</button>
        </div>
    </nav>

    <main class="container mx-auto p-6 max-w-5xl">
        
        <section class="bg-white p-5 rounded-xl shadow-sm mb-8 border-l-4 border-amber-600 flex flex-col md:flex-row gap-6 items-center">
            <div class="flex-1 w-full">
                <label class="block text-xs font-bold text-amber-900 mb-1 uppercase">Llave Maestra de Admin:</label>
                <input type="password" id="adminPass" placeholder="Introduce 1234" class="input-field py-3 text-lg tracking-widest">
            </div>
            <div class="hidden md:block bg-amber-50 p-3 rounded-lg border border-amber-100 max-w-xs">
                <p class="text-[11px] text-amber-800 leading-tight">
                    <strong>Nota:</strong> Si cambias la clave en Render, recuerda hacer clic en "Save, rebuild and deploy".
                </p>
            </div>
        </section>

        <div id="loading" class="hidden text-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-amber-900 mx-auto"></div>
            <p class="mt-4 text-amber-900 font-semibold italic">Conectando con el barril...</p>
        </div>

        <section id="inventario-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cargado por JS -->
        </section>
        
    </main>

    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl z-50 font-semibold border border-white/10"></div>

    <script>
        const isPreview = window.location.protocol === 'blob:' || window.location.hostname === '';
        const API_BASE = isPreview ? 'https://kolchawwe-web.onrender.com' : '';

        window.onload = cargarInventario;

        async function cargarInventario() {
            const container = document.getElementById('inventario-container');
            const loader = document.getElementById('loading');
            
            loader.classList.remove('hidden');
            container.innerHTML = '';

            try {
                const response = await fetch(`${API_BASE}/api/cervezas`);
                const cervezas = await response.json();
                loader.classList.add('hidden');

                cervezas.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'beer-card flex flex-col gap-4';
                    card.innerHTML = `
                        <div class="flex justify-between items-center border-b border-amber-50 pb-2">
                            <span class="text-[10px] bg-amber-900 text-amber-100 px-2 py-0.5 rounded-full font-bold">ID #${c.id}</span>
                            <div class="w-3 h-3 rounded-full ${c.stock > 0 ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]'}"></div>
                        </div>
                        
                        <div>
                            <label class="text-[10px] font-bold text-amber-800 uppercase ml-1">Variedad</label>
                            <input type="text" id="nombre-${c.id}" value="${c.nombre || ''}" class="input-field font-bold">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-amber-800 uppercase ml-1">Precio ($)</label>
                                <input type="number" id="precio-${c.id}" value="${c.precio || 0}" class="input-field">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-amber-800 uppercase ml-1">Stock</label>
                                <input type="number" id="stock-${c.id}" value="${c.stock || 0}" class="input-field">
                            </div>
                        </div>

                        <button onclick="guardarCambios(${c.id})" class="mt-2 bg-amber-900 text-white py-3 rounded-xl font-bold hover:bg-black transition-all active:scale-95 text-sm">
                            Guardar Cambios
                        </button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                loader.classList.add('hidden');
                showToast("❌ Error al conectar", true);
            }
        }

        async function guardarCambios(id) {
            const pass = document.getElementById('adminPass').value;
            const nombre = document.getElementById(`nombre-${id}`).value;
            const precio = document.getElementById(`precio-${id}`).value;
            const stock = document.getElementById(`stock-${id}`).value;

            if (!pass) {
                showToast("⚠️ Introduce la contraseña", true);
                document.getElementById('adminPass').focus();
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/admin/stock`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id, nombre, precio: parseFloat(precio), stock: parseInt(stock), password: pass
                    })
                });

                if (response.ok) {
                    showToast("✅ ¡Datos actualizados!");
                    cargarInventario();
                } else {
                    const error = await response.json();
                    showToast("❌ " + (error.error || "Error"), true);
                }
            } catch (e) {
                showToast("📡 Error de red", true);
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.backgroundColor = isError ? '#991b1b' : '#166534';
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>

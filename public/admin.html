<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Kolchawwe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #3f3f46; } /* Zinc 700 */
        h3 { font-family: 'Playfair Display', serif; }
        .card-variety {
            background-color: #000000;
            border: 1px solid #27272a;
            border-top: 4px solid #f59e0b;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-black border-b border-amber-900/20 sticky top-0 z-50 h-16 flex items-center shadow-xl">
        <div class="max-w-2xl mx-auto px-6 w-full flex justify-between items-center text-amber-500">
            <span class="font-bold tracking-tighter">KOLCHAWWE <span class="text-[10px] text-zinc-500 ml-2">ADMIN</span></span>
            <a href="/" class="text-[11px] font-bold uppercase tracking-widest text-zinc-400 hover:text-amber-500 transition">Tienda</a>
        </div>
    </nav>

    <main class="p-6">
        <div class="max-w-sm mx-auto mt-10">
            
            <section id="login-section" class="bg-black p-8 rounded-3xl border border-zinc-800 text-center shadow-2xl">
                <h2 class="text-xl font-bold text-amber-500 mb-6 italic">Acceso Maestro</h2>
                <div class="space-y-4">
                    <input type="password" id="adminPass" placeholder="Clave" 
                           class="w-full bg-zinc-900 border border-amber-900/30 rounded-xl p-3 text-2xl text-center text-amber-500 tracking-widest outline-none focus:border-amber-500">
                    <button onclick="verificarAcceso()" class="w-full bg-amber-500 text-black font-black p-4 rounded-xl hover:bg-amber-400 transition active:scale-95 shadow-lg">
                        INGRESAR
                    </button>
                </div>
            </section>

            <div id="admin-content" class="hidden">
                <div id="status-msg" class="text-center py-10 text-amber-500 font-bold">Cargando variedades de la bodega...</div>
                <div id="inventario-container"></div>
            </div>

        </div>
    </main>

    <!-- Notificaciones -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 opacity-0 transition-all duration-500 z-50 w-full max-w-xs text-center">
        <div id="toast-content" class="bg-amber-500 text-black px-6 py-4 rounded-2xl font-black shadow-2xl border-2 border-amber-400 uppercase text-xs"></div>
    </div>

    <script>
        function verificarAcceso() {
            const pass = document.getElementById('adminPass').value;
            if (pass.trim() === "1234") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                cargarInventario();
            } else {
                notificar("⛔ CLAVE INCORRECTA", true);
            }
        }

        async function cargarInventario() {
            const container = document.getElementById('inventario-container');
            const status = document.getElementById('status-msg');
            
            try {
                const response = await fetch('/api/cervezas');
                const cervezas = await response.json();
                
                if (cervezas.length === 0) {
                    status.innerHTML = "⚠️ LA BASE DE DATOS ESTÁ VACÍA.<br><span class='text-xs font-normal text-zinc-400'>Debes insertar las variedades en el Shell de Render.</span>";
                    return;
                }

                status.classList.add('hidden');
                renderizar(cervezas);
            } catch (e) {
                status.innerText = "❌ ERROR: El servidor no responde";
                console.error("Error al cargar:", e);
            }
        }

        function renderizar(data) {
            const container = document.getElementById('inventario-container');
            container.innerHTML = '';
            data.forEach(c => {
                const div = document.createElement('div');
                div.className = 'card-variety';
                div.innerHTML = `
                    <h3 class="text-2xl font-bold text-amber-500 italic text-center mb-4">${c.nombre}</h3>
                    <div class="space-y-4">
                        <div class="bg-zinc-900 p-4 rounded-xl">
                            <label class="text-[10px] text-zinc-500 uppercase font-bold block mb-2">Precio (CLP)</label>
                            <input type="number" id="precio-${c.id}" value="${c.precio}" class="w-full bg-amber-100 rounded-lg p-2 text-black font-black text-center text-xl outline-none">
                        </div>
                        <div class="bg-zinc-900 p-4 rounded-xl">
                            <label class="text-[10px] text-zinc-500 uppercase font-bold block mb-2">Stock Barriles</label>
                            <input type="number" id="stock-${c.id}" value="${c.stock}" class="w-full bg-amber-100 rounded-lg p-2 text-black font-black text-center text-xl outline-none">
                        </div>
                        <button onclick="guardar(${c.id}, '${c.nombre}')" class="w-full bg-amber-600 text-black font-black py-3 rounded-lg hover:bg-amber-500 transition uppercase text-sm border-b-4 border-amber-800">
                            Guardar Cambios
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function guardar(id, nombre) {
            const pass = document.getElementById('adminPass').value;
            const precio = document.getElementById(`precio-${id}`).value;
            const stock = document.getElementById(`stock-${id}`).value;
            try {
                const res = await fetch('/api/admin/stock', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, precio, stock, password: pass })
                });
                if (res.ok) notificar("✅ GUARDADO: " + nombre);
                else notificar("❌ ERROR AL GUARDAR", true);
            } catch (e) { notificar("📡 SIN CONEXIÓN", true); }
        }

        function notificar(msg, error = false) {
            const toast = document.getElementById('toast');
            const content = document.getElementById('toast-content');
            content.innerText = msg;
            content.className = `px-6 py-4 rounded-2xl font-black shadow-2xl border-2 uppercase text-xs ${error ? 'bg-red-700 text-white border-red-500' : 'bg-amber-500 text-black border-amber-400'}`;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 3000);
        }
    </script>
</body>
</html>

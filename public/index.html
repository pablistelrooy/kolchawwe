<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOLCHAWWE | Fine Artisanal Beer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400;600&display=swap');
        :root { --gold: #b38e44; --dark: #070707; }
        body { background-color: var(--dark); color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Cinzel', serif; }
        .beer-card { background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%); border: 1px solid rgba(255,255,255,0.05); transition: all 0.5s ease; }
        .btn-gold { background: linear-gradient(135deg, #b38e44 0%, #d4af37 100%); color: #000; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; transition: 0.3s; }
        #cart-panel { background: #050505; border-left: 1px solid rgba(179,142,68,0.1); transition: 0.5s ease; }
        .cart-open #cart-panel { transform: translateX(0); }
        .cart-closed #cart-panel { transform: translateX(100%); }
        .loader { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="cart-closed">

    <!-- Notificación -->
    <div id="notification" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] opacity-0 transition-all duration-500">
        <div class="bg-zinc-900 border border-amber-600/30 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3">
            <span id="notification-text" class="text-[10px] uppercase tracking-widest font-bold"></span>
        </div>
    </div>

    <nav class="fixed w-full top-0 bg-black/90 backdrop-blur-md border-b border-white/5 py-4 px-8 flex justify-between items-center z-50">
        <div class="serif text-lg tracking-[0.2em]">KOLCHAWWE</div>
        <button onclick="toggleCart()" class="relative text-zinc-400">
            <i class="fa-solid fa-cart-shopping text-xl"></i>
            <span id="cart-badge" class="absolute -top-2 -right-2 bg-amber-600 text-black text-[10px] font-bold px-1.5 rounded-full">0</span>
        </button>
    </nav>

    <header class="pt-40 pb-20 text-center">
        <h1 class="serif text-4xl md:text-6xl mb-4 italic">Colección de Bodega</h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.4em]">Nobleza Salvaje del Colchagua</p>
    </header>

    <main class="max-w-6xl mx-auto px-8 pb-32">
        <div id="catalog-status" class="text-center py-10 text-zinc-500 text-xs uppercase tracking-widest">
            <div class="loader mx-auto mb-4"></div>
            Sincronizando con el servidor...
        </div>
        <div id="catalog" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
    </main>

    <aside id="cart-panel" class="fixed top-0 right-0 h-full w-full md:w-[400px] z-[100] translate-x-full flex flex-col">
        <div class="p-8 border-b border-white/5 flex justify-between items-center">
            <h2 class="serif text-xl italic">Tu Selección</h2>
            <button onclick="toggleCart()" class="text-zinc-500 text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-8 space-y-4"></div>
        <div class="p-8 bg-zinc-950 border-t border-white/5">
            <div class="flex justify-between mb-6">
                <span class="text-[10px] uppercase text-zinc-500 font-bold">Total</span>
                <span id="cart-total" class="serif text-2xl font-bold">$0</span>
            </div>
            <button id="pay-btn" onclick="iniciarPago()" class="btn-gold w-full py-4 rounded-lg flex items-center justify-center gap-3 disabled:opacity-30">
                PAGAR CON MERCADO PAGO
            </button>
        </div>
    </aside>

    <script>
        // Forzamos la URL de producción si detectamos que estamos en Render
        const API_URL = window.location.hostname.includes('onrender.com') 
            ? `https://${window.location.hostname}` 
            : window.location.origin;

        let products = [];
        let cart = JSON.parse(localStorage.getItem('kol_cart_v5')) || [];

        function notify(msg) {
            const el = document.getElementById('notification');
            document.getElementById('notification-text').innerText = msg;
            el.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => el.classList.replace('opacity-100', 'opacity-0'), 3000);
        }

        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}/api/cervezas`);
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                products = await res.json();
                
                document.getElementById('catalog-status').classList.add('hidden');
                renderCatalog();
            } catch (e) {
                console.error("Error al conectar:", e.message);
                document.getElementById('catalog-status').innerHTML = `
                    <p class="text-amber-600 mb-2">El servidor está tardando en despertar...</p>
                    <p class="text-[9px] text-zinc-600">Reintentando automáticamente</p>
                `;
                setTimeout(fetchProducts, 5000); // Reintento cada 5 segundos
            }
        }

        function renderCatalog() {
            document.getElementById('catalog').innerHTML = products.map(p => `
                <div class="beer-card p-10 text-center rounded-2xl">
                    <h3 class="serif text-2xl mb-2 italic">${p.nombre}</h3>
                    <div class="serif text-3xl text-zinc-200 mb-8">$${Number(p.precio).toLocaleString('es-CL')}</div>
                    <button onclick="addToCart(${p.id})" class="btn-gold w-full py-4 rounded-xl">Añadir al Carro</button>
                </div>
            `).join('');
            updateUI();
        }

        function toggleCart() { 
            document.body.classList.toggle('cart-open'); 
            document.body.classList.toggle('cart-closed'); 
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            const inCart = cart.find(x => x.id === id);
            if (inCart) inCart.quantity++; else cart.push({ ...p, quantity: 1 });
            updateUI();
            notify("Añadido: " + p.nombre);
        }

        function updateUI() {
            localStorage.setItem('kol_cart_v5', JSON.stringify(cart));
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="flex justify-between items-center bg-zinc-900/40 p-4 rounded-xl">
                    <div class="text-xs font-bold text-amber-500 uppercase">${i.nombre} x${i.quantity}</div>
                    <div class="text-xs">$${(i.precio * i.quantity).toLocaleString('es-CL')}</div>
                </div>
            `).join('');
            const total = cart.reduce((acc, i) => acc + (i.precio * i.quantity), 0);
            document.getElementById('cart-total').innerText = `$${total.toLocaleString('es-CL')}`;
            document.getElementById('cart-badge').innerText = cart.reduce((acc, i) => acc + i.quantity, 0);
            document.getElementById('pay-btn').disabled = cart.length === 0;
        }

        async function iniciarPago() {
            const btn = document.getElementById('pay-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loader mx-auto"></div>';
            notify("Generando orden de pago...");

            try {
                const response = await fetch(`${API_URL}/api/create-preference`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: cart })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.details || "Error del servidor");
                }

                const data = await response.json();
                if (data.init_point) {
                    window.location.href = data.init_point;
                }
            } catch (err) {
                console.error("Error en pago:", err);
                notify("Error: Mercado Pago no responde. Reintenta.");
                btn.disabled = false;
                btn.innerHTML = 'PAGAR CON MERCADO PAGO';
            }
        }

        window.onload = fetchProducts;
    </script>
</body>
</html>

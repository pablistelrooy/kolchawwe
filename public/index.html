<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOLCHAWWE | Cervecería Artesanal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap');
        
        :root {
            --mp-blue: #009ee3;
            --kol-gold: #b38e44;
            --kol-gold-light: #d4af37;
        }

        body {
            background-color: #0c0c0c;
            color: #f4e9d5;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        /* Estilo de Tarjetas de Producto - Diseño Colección de Bodega */
        .card-beer {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(179, 142, 68, 0.15);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
        }
        .card-beer:hover {
            border-color: var(--kol-gold);
            transform: translateY(-8px);
            background: rgba(30, 30, 30, 0.8);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7);
        }

        .btn-buy {
            background: var(--kol-gold);
            color: #000;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 11px;
            transition: all 0.3s;
        }
        .btn-buy:hover:not(:disabled) {
            background: var(--kol-gold-light);
            letter-spacing: 0.2em;
        }

        /* Carrito Lateral */
        #cart-panel {
            background: #000000;
            border-left: 1px solid var(--kol-gold);
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 100;
        }
        .cart-open #cart-panel { transform: translateX(0); }
        .cart-closed #cart-panel { transform: translateX(100%); }

        .gold-glow { text-shadow: 0 0 15px rgba(179, 142, 68, 0.4); }

        .loader {
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="cart-closed">

    <!-- Configuración del Ambiente (Solo para pruebas) -->
    <div class="fixed bottom-4 left-4 z-[60] bg-zinc-900/90 p-3 rounded-lg border border-white/10 text-[10px]">
        <label class="block mb-1 text-zinc-500 uppercase font-bold text-[8px]">URL de tu Render:</label>
        <input type="text" id="render-url" placeholder="https://kolchawwe-web.onrender.com" 
               class="bg-black border border-white/20 p-1 rounded text-white outline-none w-48 text-[9px]">
    </div>

    <!-- Barra de Navegación -->
    <nav class="fixed w-full top-0 bg-black/95 backdrop-blur-md border-b border-white/5 p-5 flex justify-between items-center z-50">
        <div class="text-xl font-bold tracking-[0.2em] font-serif italic text-amber-600">KOLCHAWWE</div>
        <button onclick="toggleCart()" class="relative group p-2">
            <i class="fa-solid fa-cart-shopping text-xl text-zinc-400 group-hover:text-white transition"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-amber-600 text-white text-[9px] w-5 h-5 rounded-full flex items-center justify-center font-bold border-2 border-black">0</span>
        </button>
    </nav>

    <!-- Encabezado Estilo Bodega -->
    <header class="pt-40 pb-20 px-6 text-center">
        <div class="mb-6">
            <span class="text-[10px] tracking-[0.5em] uppercase text-amber-700 font-bold">Nobleza Salvaje</span>
        </div>
        <h1 class="text-4xl md:text-7xl font-serif italic text-white gold-glow mb-6">Colección de Bodega</h1>
        <p class="max-w-2xl mx-auto text-zinc-500 text-sm leading-relaxed tracking-wide">
            Cervezas de autor nacidas en el Valle de Colchagua. Procesos lentos, sabores profundos y el carácter indomable de nuestra tierra.
        </p>
        <div class="h-[1px] w-32 bg-amber-900/30 mx-auto mt-12"></div>
    </header>

    <!-- Catálogo de Productos -->
    <main class="max-w-6xl mx-auto px-6 pb-40">
        <div id="catalog" class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <!-- Cargando productos dinámicamente -->
            <div class="col-span-full text-center py-20 text-zinc-700 uppercase tracking-widest text-xs animate-pulse">
                Abriendo los portones de la bodega...
            </div>
        </div>
    </main>

    <!-- Panel Lateral del Carrito -->
    <aside id="cart-panel" class="fixed top-0 right-0 h-full w-full md:w-[450px] translate-x-full flex flex-col shadow-2xl">
        <div class="p-8 border-b border-zinc-900 flex justify-between items-center">
            <h2 class="font-serif italic text-2xl text-white">Tu Selección</h2>
            <button onclick="toggleCart()" class="text-zinc-500 hover:text-white text-3xl transition">&times;</button>
        </div>

        <div id="cart-items" class="flex-1 overflow-y-auto p-8 space-y-6">
            <!-- Items del carrito -->
        </div>

        <div class="p-8 bg-zinc-950 border-t border-zinc-900">
            <div class="flex justify-between items-center mb-8 px-2">
                <span class="text-xs uppercase tracking-widest text-zinc-500 font-bold">Total Compra</span>
                <span id="cart-total" class="text-3xl font-serif text-white">$0</span>
            </div>
            
            <button id="pay-btn" onclick="iniciarPago()" 
                    class="w-full bg-[#009ee3] hover:bg-[#0087c2] text-white py-5 rounded-xl font-bold flex items-center justify-center gap-3 transition-all disabled:opacity-30">
                <i class="fa-solid fa-credit-card"></i>
                PAGAR CON MERCADO PAGO
            </button>
            <p class="text-[9px] text-zinc-600 text-center mt-4 uppercase tracking-widest">Transacción segura vía Mercado Pago</p>
        </div>
    </aside>

    <script>
        let products = [];
        let cart = JSON.parse(localStorage.getItem('kolchawwe_v3_cart')) || [];

        async function loadProducts() {
            const baseUrl = document.getElementById('render-url').value || '';
            try {
                const res = await fetch(`${baseUrl}/api/cervezas`);
                products = await res.json();
                renderCatalog();
                updateUI();
            } catch (err) {
                console.error(err);
                // Si falla el fetch al backend, mostramos locales para previsualizar diseño
                products = [
                    {id: 1, nombre: 'Lager', precio: 4500, stock: 10},
                    {id: 2, nombre: 'Golden Ale', precio: 4800, stock: 5},
                    {id: 3, nombre: 'Stout', precio: 5000, stock: 0}
                ];
                renderCatalog();
            }
        }

        function renderCatalog() {
            const container = document.getElementById('catalog');
            container.innerHTML = products.map(p => `
                <div class="card-beer p-10 rounded-2xl text-center">
                    <div class="absolute top-4 right-6 text-[7px] uppercase tracking-widest text-amber-700 font-black">
                        ${p.stock > 0 ? 'En Stock' : 'Agotado'}
                    </div>
                    <h3 class="text-2xl font-serif italic uppercase mb-2 text-white tracking-tighter">${p.nombre}</h3>
                    <p class="text-[9px] text-zinc-500 uppercase tracking-[0.2em] mb-12">Variedad Artesanal</p>
                    <div class="text-4xl font-light mb-12 text-white font-serif italic">$${p.precio.toLocaleString('es-CL')}</div>
                    <button onclick="addToCart(${p.id})" 
                            class="btn-buy w-full py-4 rounded-xl shadow-lg" 
                            ${p.stock <= 0 ? 'disabled' : ''}>
                        ${p.stock > 0 ? 'Añadir al Carro' : 'Sin Stock'}
                    </button>
                    <p class="text-[8px] uppercase text-zinc-700 mt-6 tracking-widest">${p.stock} unidades disponibles</p>
                </div>
            `).join('');
        }

        function toggleCart() { 
            document.body.classList.toggle('cart-open'); 
            document.body.classList.toggle('cart-closed'); 
        }

        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            const inCart = cart.find(item => item.id === id);
            if(inCart) { 
                if(inCart.quantity < p.stock) inCart.quantity++; 
            } else { 
                cart.push({...p, quantity: 1}); 
            }
            updateUI();
            if(document.body.classList.contains('cart-closed')) toggleCart();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            const p = products.find(prod => prod.id === id);
            if(delta > 0 && item.quantity >= p.stock) return;
            item.quantity += delta;
            if(item.quantity <= 0) cart = cart.filter(i => i.id !== id);
            updateUI();
        }

        function updateUI() {
            localStorage.setItem('kolchawwe_v3_cart', JSON.stringify(cart));
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const badge = document.getElementById('cart-badge');
            
            container.innerHTML = cart.map(i => `
                <div class="bg-zinc-900/40 p-6 rounded-2xl border border-zinc-800">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold uppercase tracking-widest text-amber-600">${i.nombre}</span>
                        <span class="font-serif text-white">$${(i.precio * i.quantity).toLocaleString('es-CL')}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center border border-zinc-700 bg-black rounded-lg overflow-hidden">
                            <button onclick="updateQty(${i.id}, -1)" class="w-10 h-10 flex items-center justify-center hover:bg-zinc-800 transition">-</button>
                            <span class="w-10 text-center text-xs font-bold text-white">${i.quantity}</span>
                            <button onclick="updateQty(${i.id}, 1)" class="w-10 h-10 flex items-center justify-center hover:bg-zinc-800 transition">+</button>
                        </div>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((acc, i) => acc + (i.precio * i.quantity), 0);
            totalEl.innerText = `$${total.toLocaleString('es-CL')}`;
            badge.innerText = cart.reduce((acc, i) => acc + i.quantity, 0);
            document.getElementById('pay-btn').disabled = cart.length === 0;
        }

        async function iniciarPago() {
            const baseUrl = document.getElementById('render-url').value;
            if(!baseUrl) {
                alert("Ingresa la URL de tu backend en el cuadro inferior izquierdo para procesar el pago.");
                return;
            }

            const btn = document.getElementById('pay-btn');
            btn.innerHTML = '<div class="loader"></div>';
            btn.disabled = true;

            try {
                const res = await fetch(`${baseUrl}/api/create-preference`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        items: cart.map(i => ({ 
                            title: `Cerveza Kolchawwe ${i.nombre}`, 
                            unit_price: i.precio, 
                            quantity: i.quantity 
                        })) 
                    })
                });
                const data = await res.json();
                if(data.init_point) {
                    window.location.href = data.init_point;
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("Error al conectar con el servidor de pagos en Render.");
                btn.innerHTML = '<i class="fa-solid fa-credit-card"></i> PAGAR CON MERCADO PAGO';
                btn.disabled = false;
            }
        }

        loadProducts();
    </script>
</body>
</html>

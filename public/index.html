<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Kolchawwe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fafaf9; 
            color: #1c1917;
        }
        h1, h2 { font-family: 'Playfair Display', serif; }
        
        .input-minimal {
            @apply w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm transition-all focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none;
        }
        .btn-primary {
            @apply bg-amber-900 text-amber-50 px-4 py-2 rounded-lg font-semibold text-sm hover:bg-stone-900 transition-all active:scale-95;
        }
        .card-beer {
            @apply bg-white border border-stone-100 rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-white border-b border-stone-100 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-xl font-bold tracking-tight text-amber-900">KOLCHAWWE</span>
                <span class="text-[10px] uppercase tracking-widest text-stone-400 font-bold">Admin Panel</span>
            </div>
            <a href="/" class="text-xs font-bold text-stone-500 hover:text-amber-900 flex items-center gap-1 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                </svg>
                IR A LA TIENDA
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 mt-10">
        
        <section class="mb-12 max-w-sm">
            <label class="block text-[11px] font-bold text-stone-500 uppercase tracking-wider mb-2">Clave de Seguridad</label>
            <div class="relative">
                <input type="password" id="adminPass" placeholder="Introduce clave admin" 
                       class="input-minimal text-lg tracking-widest pl-4">
                <div class="absolute right-3 top-3 text-stone-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
            </div>
        </section>

        <div id="loading" class="hidden py-20 text-center">
            <div class="inline-block animate-bounce text-amber-900 font-serif italic text-lg">Cargando barriles...</div>
        </div>

        <div id="inventario-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Las tarjetas se generan aquí -->
        </div>

    </main>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 opacity-0 translate-y-4 pointer-events-none transition-all duration-300 z-50">
        <div id="toast-content" class="bg-stone-900 text-white px-6 py-3 rounded-full text-sm font-medium shadow-2xl flex items-center gap-3">
            <!-- Icono y mensaje -->
        </div>
    </div>

    <script>
        const isPreview = window.location.protocol === 'blob:' || window.location.hostname === '';
        const API_BASE = isPreview ? 'https://kolchawwe-web.onrender.com' : '';

        window.onload = cargarInventario;

        async function cargarInventario() {
            const container = document.getElementById('inventario-container');
            const loader = document.getElementById('loading');
            
            loader.classList.remove('hidden');
            container.innerHTML = '';

            try {
                const response = await fetch(`${API_BASE}/api/cervezas`);
                const cervezas = await response.json();
                loader.classList.add('hidden');

                cervezas.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'card-beer flex flex-col gap-5';
                    div.innerHTML = `
                        <div class="flex justify-between items-center border-b border-stone-50 pb-3">
                            <span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">ID #${c.id}</span>
                            <div class="h-2 w-2 rounded-full ${c.stock > 0 ? 'bg-green-400' : 'bg-red-400 animate-pulse'}"></div>
                        </div>

                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-stone-500 uppercase ml-1">Nombre Variedad</label>
                                <input type="text" id="nombre-${c.id}" value="${c.nombre || ''}" class="input-minimal font-semibold">
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-bold text-stone-500 uppercase ml-1">Precio ($)</label>
                                    <input type="number" id="precio-${c.id}" value="${c.precio || 0}" class="input-minimal">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-stone-500 uppercase ml-1">Stock (Unid.)</label>
                                    <input type="number" id="stock-${c.id}" value="${c.stock || 0}" class="input-minimal">
                                </div>
                            </div>
                        </div>

                        <button onclick="guardar(${c.id})" class="btn-primary w-full mt-2">
                            Actualizar Datos
                        </button>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                loader.classList.add('hidden');
                notificar("Error de conexión", true);
            }
        }

        async function guardar(id) {
            const password = document.getElementById('adminPass').value;
            const nombre = document.getElementById(`nombre-${id}`).value;
            const precio = document.getElementById(`precio-${id}`).value;
            const stock = document.getElementById(`stock-${id}`).value;

            if (!password) {
                notificar("⚠️ Ingresa la clave primero", true);
                document.getElementById('adminPass').focus();
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/admin/stock`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        id, 
                        nombre, 
                        precio: parseFloat(precio), 
                        stock: parseInt(stock), 
                        password 
                    })
                });

                if (res.ok) {
                    notificar("✅ Datos actualizados con éxito");
                    cargarInventario();
                } else {
                    const err = await res.json();
                    notificar("❌ " + (err.error || "Error"), true);
                }
            } catch (e) {
                notificar("📡 Error de red", true);
            }
        }

        function notificar(msg, error = false) {
            const toast = document.getElementById('toast');
            const content = document.getElementById('toast-content');
            content.innerText = msg;
            content.className = error ? "bg-red-900 text-red-50 px-6 py-3 rounded-full text-sm font-medium shadow-2xl flex items-center gap-3" 
                                     : "bg-stone-900 text-white px-6 py-3 rounded-full text-sm font-medium shadow-2xl flex items-center gap-3";
            
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }
    </script>
</body>
</html>

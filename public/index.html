<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolchawwe | Cerveza Artesanal San Fernando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- SDK de Mercado Pago -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --brand-gold: #b38e44;
            --brand-cream: #f4e9d5;
            --brand-dark: #1a1613;
            --mp-blue: #009ee3;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--brand-dark);
            color: var(--brand-cream);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        h1, h2, h3, .brand-font {
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.05em;
        }

        .hero-section {
            background: linear-gradient(rgba(26, 22, 19, 0.85), rgba(26, 22, 19, 0.85)), 
                        url('https://images.unsplash.com/photo-1571767490048-222875c45e8e?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
        }

        .label-card {
            background-color: #110f0d;
            border: 1px solid #332d28;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .label-card:hover {
            border-color: var(--brand-gold);
            transform: translateY(-5px);
        }

        #cart-panel {
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            transform: translateX(100%);
            width: 320px;
            z-index: 100;
        }
        #cart-panel.open { transform: translateX(0); }

        #age-gate {
            background-color: rgba(10, 9, 8, 0.98);
            z-index: 200;
            display: none; 
        }
        #age-gate.active { display: flex; }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25d366;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 90;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(179, 142, 68, 0.1);
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid rgba(179, 142, 68, 0.3);
        }

        .qty-btn {
            color: var(--brand-gold);
            font-weight: bold;
            font-size: 18px;
        }

        .loader { width: 24px; height: 24px; border: 3px solid rgba(179, 142, 68, 0.2); border-top-color: var(--brand-gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Verificación de Edad -->
    <div id="age-gate" class="fixed inset-0 items-center justify-center p-6 text-center">
        <div class="max-w-md w-full border border-brand-gold/30 p-10 bg-[#110f0d] shadow-2xl rounded-lg">
            <h2 class="text-3xl font-bold text-brand-gold italic mb-4 uppercase">Verificación</h2>
            <p class="text-brand-cream/80 mb-8 text-sm uppercase tracking-widest leading-relaxed">Para adquirir nuestros productos debes ser mayor de 18 años.</p>
            <div class="flex flex-col gap-3">
                <button onclick="confirmAge()" class="bg-brand-gold text-white py-3 font-bold uppercase tracking-widest hover:brightness-110">Sí, soy mayor</button>
                <button onclick="location.href='https://google.com'" class="border border-brand-gold/30 text-brand-gold py-3 text-xs uppercase opacity-60">Soy menor de edad</button>
            </div>
        </div>
    </div>

    <!-- Carrito Lateral -->
    <div id="cart-panel" class="fixed top-0 right-0 h-full bg-[#110f0d] shadow-2xl border-l border-[#332d28] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6 border-b border-[#332d28] pb-4">
            <h2 class="text-xl font-bold text-brand-gold italic">Mi Pedido</h2>
            <button onclick="toggleCart()" class="text-2xl hover:text-brand-gold">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4"></div>
        <div class="border-t border-[#332d28] pt-6 mt-4">
            <div class="flex justify-between text-lg font-bold mb-4">
                <span>Total:</span>
                <span id="cart-total" class="text-brand-gold font-mono">$0</span>
            </div>
            <button id="checkout-mp" onclick="iniciarPago()" class="w-full bg-[#009ee3] py-3 rounded text-white font-bold text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 disabled:opacity-50">
                <i class="fas fa-credit-card"></i> <span id="checkout-text">Pagar con Mercado Pago</span>
            </button>
            <div id="walletBrick_container" class="mt-4"></div>
            <p id="error-msg" class="text-red-500 text-[10px] mt-2 hidden text-center italic"></p>
        </div>
    </div>

    <!-- Navegación -->
    <nav class="fixed w-full z-50 bg-[#110f0d]/90 border-b border-[#332d28] px-6 py-4 flex justify-between items-center">
        <div class="text-xl font-bold tracking-widest text-brand-gold uppercase italic">KOLCHAWWE</div>
        <button onclick="toggleCart()" class="relative p-2 text-brand-gold">
            <i class="fas fa-shopping-basket text-xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[9px] rounded-full w-5 h-5 flex items-center justify-center font-bold border border-brand-gold">0</span>
        </button>
    </nav>

    <!-- Contenido Principal -->
    <div id="main-content">
        <header class="hero-section min-h-[70vh] flex flex-col items-center justify-center text-center pt-20 px-6">
            <div class="mb-6">
                <img src="Logo Kolchawwe.png" alt="Logo Kolchawwe" class="w-48 md:w-64 mx-auto" onerror="this.style.display='none'; document.getElementById('alt-logo').classList.remove('hidden');">
                <div id="alt-logo" class="hidden text-4xl font-bold tracking-widest text-brand-gold italic border-2 border-brand-gold p-6">KOLCHAWWE</div>
            </div>
            <p class="mt-4 text-2xl md:text-3xl font-bold italic tracking-tight text-white uppercase">Nobleza Salvaje</p>
            <button onclick="document.getElementById('cervezas').scrollIntoView({behavior: 'smooth'})" class="mt-10 border border-brand-gold text-brand-gold px-8 py-3 text-[10px] uppercase font-bold tracking-[0.3em] hover:bg-brand-gold hover:text-white transition-all">Ver Colección</button>
        </header>

        <section id="cervezas" class="py-24 px-6 max-w-7xl mx-auto">
            <div class="text-center mb-16">
                <h2 class="text-4xl font-bold uppercase tracking-tighter mb-4 italic">Nuestras Cepas</h2>
                <div class="w-20 h-0.5 bg-brand-gold mx-auto"></div>
                <div id="loading-catalog" class="mt-10 flex flex-col items-center gap-2">
                    <div class="loader"></div>
                    <span id="loader-text" class="text-[10px] uppercase tracking-widest opacity-50">Conectando con la bodega...</span>
                </div>
            </div>
            <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>

        <footer class="bg-[#0a0908] py-20 text-center px-6 border-t border-[#1a1613]">
            <h2 class="text-2xl font-bold text-brand-gold mb-8 italic">KOLCHAWWE</h2>
            <div class="flex justify-center space-x-8 mb-12 text-xl">
                <a href="https://wa.me/56943409132" target="_blank" class="hover:text-brand-gold transition"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.instagram.com/kolchawwe/" target="_blank" class="hover:text-brand-gold transition"><i class="fab fa-instagram"></i></a>
            </div>
            <p class="text-[9px] opacity-30 tracking-[0.3em] uppercase">© 2026 KOLCHAWWE BREWING CO.</p>
        </footer>
    </div>

    <script>
        const API_URL = "https://web-kolchawwe.onrender.com";
        const MP_PUBLIC_KEY = 'APP_USR-66a41ad9-9a3b-48b2-a060-27e662a71d72';
        
        let inventory = [];
        let cart = JSON.parse(localStorage.getItem('kol_cart')) || [];
        let ageVerified = localStorage.getItem('kol_age_verified') === 'true';
        let pendingProductId = null;

        // Inicializar Mercado Pago
        let mp = null;
        try { mp = new window.MercadoPago(MP_PUBLIC_KEY, { locale: 'es-CL' }); } catch (e) { console.error("MP Error:", e); }

        // --- FUNCIONES DE CARGA ---

        async function fetchInventory(retries = 5) {
            const grid = document.getElementById('products-grid');
            const loader = document.getElementById('loading-catalog');
            const loaderText = document.getElementById('loader-text');
            
            // Si el servidor está despertando, avisamos al usuario
            if (retries < 5) loaderText.innerText = "El servidor está despertando, un momento...";

            const paths = [`${API_URL}/api/cervezas`, `${API_URL}/cervezas`];
            
            for (let path of paths) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 8000); // Esperar 8 seg por ruta

                    const response = await fetch(path, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        inventory = await response.json();
                        loader.classList.add('hidden');
                        renderProducts();
                        return; 
                    }
                } catch (err) {
                    console.warn(`Intento fallido en ${path}`);
                }
            }

            if (retries > 0) {
                await new Promise(res => setTimeout(res, 3000));
                return fetchInventory(retries - 1);
            }

            loader.innerHTML = `
                <div class="p-4 border border-red-500/30 rounded bg-red-900/10">
                    <p class="text-red-400 text-xs italic mb-2">No pudimos conectar con la bodega.</p>
                    <button onclick="location.reload()" class="text-brand-gold text-[10px] font-bold uppercase tracking-widest border border-brand-gold p-2 hover:bg-brand-gold hover:text-white transition">Reintentar</button>
                </div>
            `;
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = inventory.map(p => `
                <div class="label-card p-10 text-center ${p.stock <= 0 ? 'opacity-40 grayscale' : ''}">
                    <h3 class="text-2xl text-brand-gold mb-2 uppercase italic font-bold">${p.nombre}</h3>
                    <p class="text-[10px] uppercase tracking-widest opacity-60 mb-4">${p.variedad || 'Artesanal'}</p>
                    <div class="w-full h-px bg-[#332d28] my-4"></div>
                    <span class="text-brand-gold font-bold text-xs">${p.stock > 0 ? 'DISPONIBLE' : 'AGOTADO'}</span>
                    <p class="text-2xl font-bold mt-6">$${Number(p.precio).toLocaleString('es-CL')}</p>
                    <button onclick="add(${p.id})" ${p.stock <= 0 ? 'disabled' : ''} 
                            class="w-full mt-6 border border-brand-gold/40 py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-brand-gold hover:text-white transition-all disabled:border-zinc-700 disabled:text-zinc-700">
                        ${p.stock <= 0 ? 'Sin Stock' : 'Añadir al Carro'}
                    </button>
                </div>
            `).join('');
        }

        // --- CARRITO ---
        window.confirmAge = () => {
            ageVerified = true;
            localStorage.setItem('kol_age_verified', 'true');
            document.getElementById('age-gate').classList.remove('active');
            if (pendingProductId) { add(pendingProductId); pendingProductId = null; }
        };

        window.toggleCart = () => document.getElementById('cart-panel').classList.toggle('open');

        window.add = (id) => {
            if (!ageVerified) {
                pendingProductId = id;
                document.getElementById('age-gate').classList.add('active');
                return;
            }
            const p = inventory.find(x => x.id === id);
            if (!p) return;
            const inCart = cart.find(x => x.id === id);
            if (inCart) { if (inCart.qty < p.stock) inCart.qty++; } 
            else { cart.push({ ...p, qty: 1 }); }
            updateCart();
            if (!document.getElementById('cart-panel').classList.contains('open')) toggleCart();
        };

        window.removeOne = (id) => {
            const item = cart.find(x => x.id === id);
            if (item) { item.qty--; if (item.qty <= 0) cart = cart.filter(x => x.id !== id); updateCart(); }
        };

        window.del = (id) => { cart = cart.filter(x => x.id !== id); updateCart(); };

        function updateCart() {
            localStorage.setItem('kol_cart', JSON.stringify(cart));
            const list = document.getElementById('cart-items');
            let total = 0, count = 0;
            list.innerHTML = cart.length === 0 ? '<p class="text-center py-10 opacity-20 italic text-xs">Vacío</p>' :
                cart.map(item => {
                    total += item.precio * item.qty;
                    count += item.qty;
                    return `
                        <div class="bg-[#1a1613] p-4 border border-[#332d28] flex justify-between items-center">
                            <div>
                                <h4 class="text-[10px] font-bold uppercase text-brand-gold">${item.nombre}</h4>
                                <div class="qty-control mt-2">
                                    <button onclick="removeOne(${item.id})" class="qty-btn">-</button>
                                    <span class="text-xs">${item.qty}</span>
                                    <button onclick="add(${item.id})" class="qty-btn">+</button>
                                </div>
                            </div>
                            <p class="text-xs font-bold">$${(item.precio * item.qty).toLocaleString('es-CL')}</p>
                        </div>`;
                }).join('');
            document.getElementById('cart-total').innerText = `$${total.toLocaleString('es-CL')}`;
            document.getElementById('cart-count').innerText = count;
            document.getElementById('checkout-mp').disabled = cart.length === 0;
        }

        async function iniciarPago() {
            const btn = document.getElementById('checkout-mp');
            const btnText = document.getElementById('checkout-text');
            btn.disabled = true;
            btnText.innerText = "Cargando...";

            const payPaths = [`${API_URL}/api/create-preference`, `${API_URL}/create-preference`];
            for (let path of payPaths) {
                try {
                    const response = await fetch(path, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ items: cart })
                    });
                    if (response.ok) {
                        const data = await response.json();
                        if (data.init_point) { window.location.href = data.init_point; return; }
                    }
                } catch (e) {}
            }
            btn.disabled = false;
            btnText.innerText = "Error, reintentar";
        }

        window.onload = () => {
            fetchInventory();
            updateCart();
            if (!ageVerified) document.getElementById('age-gate').classList.add('active');
        };
    </script>

    <a href="https://wa.me/56943409132" class="whatsapp-float hover:scale-110 transition" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
</body>
</html>
